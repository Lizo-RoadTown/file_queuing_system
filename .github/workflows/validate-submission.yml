name: Validate Submission

on:
  pull_request:
    paths:
      - 'reviews/in-progress/**'
      - 'reviews/awaiting-review-2/**'
      - 'reviews/completed/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check submission shape
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            // Find which review folders this PR touches
            const changed = execSync(
              `git diff --name-only origin/${context.payload.pull_request.base.ref}...HEAD`
            ).toString().split('\n').filter(Boolean);

            const folders = new Set();
            const looseFiles = [];
            for (const f of changed) {
              const m = f.match(/^reviews\/(in-progress|awaiting-review-2|completed)\/([^\/]+)\//);
              if (m) {
                folders.add(`reviews/${m[1]}/${m[2]}`);
              } else if (/^reviews\/(in-progress|awaiting-review-2|completed)\/[^\/]+$/.test(f)) {
                looseFiles.push(f);
              }
            }

            if (looseFiles.length > 0) {
              const body = [
                '### Submission validation failed',
                '',
                'The following files were submitted directly to a review stage folder instead of inside a named subfolder:',
                ...looseFiles.map(f => `- \`${f}\``),
                '',
                'Every submission must be placed inside its own named folder, e.g.:',
                '```',
                'reviews/awaiting-review-2/MyPaper/',
                '  MyPaper.ipynb',
                '  MyPaper.pdf',
                '```',
                '',
                'See `CONTRIBUTING.md` for the required folder shape.',
              ].join('\n');
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              core.setFailed('Loose files at review stage root — every submission must be inside its own named folder.');
              return;
            }

            if (folders.size === 0) {
              core.info('No review folders touched — skipping shape check.');
              return;
            }

            const errors = [];
            for (const folder of folders) {
              if (!fs.existsSync(folder)) continue;
              const files = fs.readdirSync(folder);
              const hasNotebook = files.some(f => f.endsWith('.ipynb'));
              const hasPdf      = files.some(f => f.toLowerCase().endsWith('.pdf'));
              const hasImage    = files.some(f => /\.(png|jpe?g|svg)$/i.test(f));

              if (!hasNotebook) errors.push(`\`${folder}\` is missing a \`.ipynb\` notebook.`);
              if (!hasPdf)      errors.push(`\`${folder}\` is missing a \`.pdf\` manuscript.`);
              if (!hasImage)    core.warning(`${folder} has no output image — allowed but discouraged.`);
            }

            if (errors.length) {
              const body = `### Submission validation failed\n\n${errors.map(e => '- ' + e).join('\n')}\n\nSee \`CONTRIBUTING.md\` for the required folder shape.`;
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              core.setFailed(errors.join('; '));
            }
